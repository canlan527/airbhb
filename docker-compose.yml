services:
  postgres:
    image: postgres:16-alpine
    container_name: airbhb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airbhb
      POSTGRES_PASSWORD: airbhb
      POSTGRES_DB: airbhb
    ports:
      - "54329:5432"
    volumes:
      - airbhb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airbhb -d airbhb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  airbhb-postgres-data:
